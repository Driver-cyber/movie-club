<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Movie Club</title>

<!-- iPhone home-screen / PWA -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Movie Club" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#181210" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<link rel="manifest" href="/manifest.webmanifest" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500;1,9..144,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#181210; --ink-2:#211810; --ink-3:#2b2017; --ink-4:#352819;
    --bone:#ece0cc; --bone-dim:#a4937c; --bone-faint:#6d6051;
    --rust:#c25e38; --rust-soft:#a8512f; --gold:#e0b25c; --gold-dim:#7a6233;
    --line:rgba(236,224,204,0.10); --line-strong:rgba(236,224,204,0.18);
    --mono:'JetBrains Mono',ui-monospace,monospace; --serif:'Fraunces',Georgia,serif;
    --bar-h:74px;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{
    background:
      radial-gradient(120% 70% at 50% -5%, rgba(194,94,56,0.12), transparent 55%),
      radial-gradient(90% 50% at 110% 108%, rgba(224,178,92,0.07), transparent 55%),
      var(--ink);
    background-attachment:fixed;
    color:var(--bone); font-family:var(--serif); -webkit-font-smoothing:antialiased;
    min-height:100vh; min-height:100dvh;
    padding:calc(var(--safe-top) + 14px) 14px calc(var(--bar-h) + var(--safe-bottom) + 18px);
    overscroll-behavior-y:contain;
  }
  .wrap{max-width:680px;margin:0 auto}

  header.app-head{text-align:center;margin-bottom:18px}
  .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:0.3em;text-transform:uppercase;
    color:var(--rust);font-weight:500;margin-bottom:8px}
  h1.title{font-family:var(--serif);font-style:italic;font-weight:500;
    font-size:clamp(36px,12vw,52px);line-height:0.95;letter-spacing:-0.01em}
  .sub{font-family:var(--mono);font-size:11px;color:var(--bone-faint);
    letter-spacing:0.12em;margin-top:9px;text-transform:uppercase}

  .marquee{background:linear-gradient(180deg,var(--ink-3),var(--ink-2));
    border:1px solid var(--line-strong);border-radius:14px;padding:14px;margin-bottom:16px;
    box-shadow:0 18px 40px -28px rgba(0,0,0,0.9)}
  .marquee-label{font-family:var(--mono);font-size:10px;letter-spacing:0.24em;text-transform:uppercase;
    color:var(--gold);margin-bottom:9px;display:block}
  .marquee-row{display:flex;gap:9px;align-items:stretch}
  select#movieSelect{flex:1;min-width:0;appearance:none;background:var(--ink);color:var(--bone);
    font-family:var(--serif);font-style:italic;font-size:18px;font-weight:500;
    border:1px solid var(--line-strong);border-radius:11px;padding:13px 36px 13px 14px;cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23a4937c' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat;background-position:right 12px center}
  select#movieSelect:focus-visible{outline:2px solid var(--rust);outline-offset:2px}
  .btn{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:0.03em;border-radius:11px;
    border:1px solid var(--line-strong);cursor:pointer;padding:0 15px;min-height:48px;
    background:var(--ink-4);color:var(--bone);transition:background .15s,transform .05s;white-space:nowrap}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:2px solid var(--rust);outline-offset:2px}
  .btn-add{background:var(--rust);border-color:transparent;color:#fff}

  .newform{margin-top:13px;padding-top:13px;border-top:1px solid var(--line);
    display:none;flex-direction:column;gap:11px}
  .newform.open{display:flex}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--bone-dim)}
  .field input{background:var(--ink);color:var(--bone);font-family:var(--serif);font-size:16px;
    border:1px solid var(--line-strong);border-radius:10px;padding:13px 13px;width:100%;min-width:0;max-width:100%}
  .field input[type="date"]{-webkit-appearance:none;appearance:none;text-align:left}
  .field input::placeholder{color:var(--bone-faint);font-style:italic}
  .field input:focus-visible{outline:2px solid var(--rust);outline-offset:1px}

  /* autocomplete */
  .ac-wrap{position:relative}
  .suggbox{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:40;
    background:var(--ink-3);border:1px solid var(--line-strong);border-radius:12px;
    display:none;max-height:328px;overflow-y:auto;-webkit-overflow-scrolling:touch;
    box-shadow:0 26px 54px -20px rgba(0,0,0,0.92)}
  .suggbox.open{display:block}
  .sugg{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;
    border:none;border-bottom:1px solid var(--line);padding:9px 11px;cursor:pointer;color:var(--bone)}
  .sugg:last-child{border-bottom:none}
  .sugg:active{background:var(--ink-4)}
  .sugg-img{width:38px;height:56px;border-radius:6px;object-fit:cover;background:var(--ink);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
  .sugg-img.ph{color:var(--bone-faint)}
  .sugg-meta{display:flex;flex-direction:column;gap:2px;min-width:0}
  .sugg-title{font-family:var(--serif);font-style:italic;font-size:16px;line-height:1.15;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sugg-year{font-family:var(--mono);font-size:10px;color:var(--bone-faint);letter-spacing:0.08em}
  .sugg-hint{font-family:var(--mono);font-size:10px;letter-spacing:0.06em;color:var(--bone-faint);
    padding:9px 12px;text-align:center}
  .pickprev{display:flex;gap:11px;align-items:center;background:var(--ink);border:1px solid var(--line-strong);
    border-radius:10px;padding:9px}
  .pickprev[hidden]{display:none}
  .pickprev img{width:40px;height:60px;border-radius:6px;object-fit:cover;flex-shrink:0}
  .pp-t{font-family:var(--serif);font-style:italic;font-size:15px;line-height:1.15}
  .pp-y{font-family:var(--mono);font-size:10px;color:var(--bone-faint);margin-top:3px;letter-spacing:0.08em}

  /* genre tag chip */
  .gtags{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px}
  .gchip{display:inline-flex;align-items:center;font-family:var(--mono);font-size:9.5px;font-weight:600;
    letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);background:rgba(224,178,92,0.10);
    border:1px solid var(--gold-dim);border-radius:20px;padding:4px 11px;cursor:pointer;line-height:1.4}
  .gchip.empty{color:var(--bone-faint);background:transparent;border-color:var(--line-strong)}
  .gchip:active{transform:translateY(1px)}
  span.gchip{cursor:default}
  .gchip:focus-visible{outline:2px solid var(--rust);outline-offset:2px}

  .panel{display:none;animation:rise .22s ease}
  .panel.active{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.panel,.panel.active{animation:none}}

  .card{background:linear-gradient(180deg,var(--ink-2),var(--ink));border:1px solid var(--line);
    border-radius:15px;padding:19px}
  .nowhead{display:flex;gap:14px;align-items:flex-start;margin-bottom:16px}
  .nowposter{width:62px;height:92px;border-radius:9px;object-fit:cover;flex-shrink:0;
    background:var(--ink-3);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:26px}
  .nowtitle{font-family:var(--serif);font-style:italic;font-weight:500;font-size:25px;line-height:1.05;margin-bottom:4px}
  .nowmeta{font-family:var(--mono);font-size:10.5px;letter-spacing:0.08em;color:var(--bone-faint);
    text-transform:uppercase;line-height:1.6}

  .cat{padding:14px 0;border-top:1px solid var(--line)}
  .cat:first-of-type{border-top:none;padding-top:2px}
  .cat-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:7px}
  .cat-name{font-family:var(--serif);font-size:19px;font-weight:600}
  .cat-desc{font-family:var(--mono);font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--bone-faint);text-align:right}
  .stars{display:flex;align-items:center}
  .star{font-size:33px;line-height:1;cursor:pointer;color:var(--ink-4);padding:5px 6px;margin:-3px 0;
    transition:transform .08s,color .12s;user-select:none;-webkit-text-stroke:1.4px var(--gold-dim)}
  .star.on{color:var(--gold);-webkit-text-stroke:0}
  .star:active{transform:scale(1.2)}
  .star:focus-visible{outline:2px solid var(--rust);outline-offset:2px;border-radius:6px}
  .catscore{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--bone-dim);font-weight:600}

  /* predictability slider */
  .slider-row{display:flex;align-items:center;gap:11px}
  .slabel{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;
    color:var(--bone-faint);white-space:nowrap}
  input.slider{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;
    background:linear-gradient(90deg,var(--rust),var(--gold));outline:none;margin:6px 0}
  input.slider.unset{background:var(--ink-4)}
  input.slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;
    background:var(--bone);border:2px solid var(--ink);box-shadow:0 2px 6px rgba(0,0,0,0.5);cursor:pointer}
  input.slider::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--bone);
    border:2px solid var(--ink);box-shadow:0 2px 6px rgba(0,0,0,0.5);cursor:pointer}
  input.slider:focus-visible{outline:2px solid var(--rust);outline-offset:4px}
  .slider-read{margin-top:9px;font-family:var(--mono);font-size:11px;color:var(--bone-dim);
    display:flex;align-items:center;gap:11px}
  .sread{color:var(--gold);font-weight:600;letter-spacing:0.02em}
  .sread.none{color:var(--bone-faint);font-weight:400}
  .clearpred{font-family:var(--mono);font-size:10px;color:var(--bone-faint);background:transparent;
    border:1px solid var(--line);border-radius:7px;padding:4px 9px;cursor:pointer}
  .clearpred:active{color:var(--bone)}

  .qwho.g{color:var(--bone-dim)}

  /* guests on the rating card */
  .guests-wrap{margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .guests-h{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;
    color:var(--bone-dim);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .guests-h span{color:var(--bone-faint);letter-spacing:0.1em}
  .guests-empty{font-family:var(--mono);font-size:10.5px;line-height:1.7;color:var(--bone-faint);margin-bottom:10px}
  .guestrow{display:flex;align-items:center;gap:10px;justify-content:space-between;
    background:var(--ink);border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-bottom:8px}
  .ginfo{display:flex;flex-direction:column;gap:2px;min-width:0}
  .gnm{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--bone);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .gst{font-family:var(--mono);font-size:9px;letter-spacing:0.06em;color:var(--bone-faint)}
  .gacts{display:flex;gap:6px;flex-shrink:0}
  .gadd{width:100%;justify-content:center;display:flex}

  .notes-wrap{margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
  .notes-wrap label{font-family:var(--mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
    color:var(--bone-dim);display:block;margin-bottom:8px}
  textarea.notes{width:100%;min-height:104px;resize:vertical;background:var(--ink);color:var(--bone);
    font-family:var(--serif);font-size:16px;line-height:1.5;border:1px solid var(--line-strong);
    border-radius:12px;padding:13px}
  textarea.notes::placeholder{color:var(--bone-faint);font-style:italic}
  textarea.notes:focus-visible{outline:2px solid var(--rust);outline-offset:1px}

  .summary-top{display:flex;gap:9px;margin-bottom:16px;flex-wrap:wrap}
  .stat{flex:1;min-width:104px;background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:13px}
  .stat .k{font-family:var(--mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--bone-faint);margin-bottom:6px}
  .stat .v{font-family:var(--serif);font-style:italic;font-size:20px;font-weight:500;line-height:1.1}
  .stat .v small{font-family:var(--mono);font-style:normal;font-size:11px;color:var(--bone-dim)}

  .sorts{display:flex;gap:6px;margin-bottom:13px;align-items:center}
  .sorts .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--bone-faint);margin-right:2px}
  .chip{font-family:var(--mono);font-size:11px;font-weight:600;padding:8px 12px;border-radius:20px;
    border:1px solid var(--line-strong);background:transparent;color:var(--bone-dim);cursor:pointer;min-height:36px}
  .chip.on{background:var(--ink-4);color:var(--bone);border-color:var(--gold-dim)}
  .chip:focus-visible{outline:2px solid var(--rust);outline-offset:2px}

  .filmrow{background:linear-gradient(180deg,var(--ink-2),var(--ink));border:1px solid var(--line);
    border-radius:14px;padding:15px 16px;margin-bottom:10px}
  .filmrow-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .frposter{width:46px;height:69px;border-radius:7px;object-fit:cover;flex-shrink:0;border:1px solid var(--line)}
  .frmain{flex:1;min-width:0}
  .filmrow .ftitle{font-family:var(--serif);font-style:italic;font-weight:500;font-size:20px;line-height:1.1}
  .filmrow .fdate{font-family:var(--mono);font-size:9.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--bone-faint);margin-top:4px}
  .verdict{text-align:right;flex-shrink:0}
  .verdict .vnum{font-family:var(--serif);font-style:italic;font-weight:600;font-size:30px;color:var(--gold);line-height:1}
  .verdict .vnum.empty{color:var(--bone-faint);font-size:21px}
  .verdict .vlbl{font-family:var(--mono);font-size:8.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--bone-faint);margin-top:3px}
  .vtoggle{margin-top:8px;font-family:var(--mono);font-size:8.5px;font-weight:600;letter-spacing:0.04em;
    color:var(--bone-dim);background:transparent;border:1px solid var(--line-strong);border-radius:14px;
    padding:5px 10px;cursor:pointer;white-space:nowrap}
  .vtoggle.on{color:var(--ink);background:var(--gold);border-color:var(--gold)}
  .vtoggle:active{transform:translateY(1px)}
  .scorebars{display:flex;flex-direction:column;gap:9px;margin-top:13px}
  .pscore{display:flex;align-items:center;gap:9px}
  .pscore .who{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--bone-dim);width:46px}
  .meter{flex:1;height:7px;border-radius:6px;background:var(--ink-4);overflow:hidden}
  .meter span{display:block;height:100%;border-radius:6px}
  .meter span.chad{background:var(--rust)}
  .meter span.joelle{background:var(--gold)}
  .meter span.guest{background:var(--bone-dim)}
  .pscore .pnum{font-family:var(--mono);font-size:12px;font-weight:600;width:30px;text-align:right}
  .pscore .pnum.none{color:var(--bone-faint);font-weight:400}
  .predline{margin-top:11px;font-family:var(--mono);font-size:10px;letter-spacing:0.04em;color:var(--bone-faint)}
  .predline .pl-k{text-transform:uppercase;letter-spacing:0.12em;margin-right:7px;color:var(--bone-dim)}
  .predline b{color:var(--bone);font-weight:600}
  .twonotes{margin-top:12px;display:grid;gap:8px}
  .qnote{background:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .qnote .qwho{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:4px}
  .qnote .qwho.c{color:var(--rust)} .qnote .qwho.j{color:var(--gold)}
  .qnote .qtext{font-family:var(--serif);font-size:14.5px;line-height:1.45;color:var(--bone-dim)}
  .filmrow-foot,.card-foot{display:flex;gap:7px;margin-top:13px;padding-top:12px;border-top:1px solid var(--line);justify-content:flex-end;flex-wrap:wrap}
  .card-foot{margin-top:16px;padding-top:14px}
  .mini{font-family:var(--mono);font-size:11px;color:var(--bone-dim);background:transparent;
    border:1px solid var(--line);border-radius:9px;padding:9px 12px;cursor:pointer;min-height:38px}
  .mini.danger:active{color:#e88a6a;border-color:rgba(232,138,106,0.4)}
  .mini:focus-visible{outline:2px solid var(--rust);outline-offset:2px}

  .empty{text-align:center;padding:42px 18px;color:var(--bone-dim)}
  .empty .big{font-family:var(--serif);font-style:italic;font-size:23px;color:var(--bone);margin-bottom:9px}
  .empty .small{font-family:var(--mono);font-size:12px;letter-spacing:0.05em;line-height:1.7}

  .syncbox{background:linear-gradient(180deg,var(--ink-3),var(--ink-2));border:1px solid var(--line-strong);
    border-radius:13px;padding:16px;margin-top:18px}
  .syncbox-h{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
  .syncbox-p{font-family:var(--serif);font-size:14.5px;color:var(--bone-dim);line-height:1.5;margin-bottom:12px}
  .synccode{font-family:var(--mono);font-size:13px;color:var(--bone);background:var(--ink);
    border:1px dashed var(--line-strong);border-radius:9px;padding:11px 12px;word-break:break-all;
    margin-bottom:12px;text-align:center;letter-spacing:0.04em}
  .syncbtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}

  .datatools{display:flex;gap:8px;margin-top:20px;justify-content:center;flex-wrap:wrap}
  .datahint{text-align:center;font-family:var(--mono);font-size:9.5px;letter-spacing:0.06em;
    color:var(--bone-faint);margin-top:9px;line-height:1.6;padding:0 12px}

  .syncline{text-align:center;margin-top:20px;font-family:var(--mono);font-size:9.5px;
    letter-spacing:0.14em;text-transform:uppercase;color:var(--bone-faint)}
  .guideline{text-align:center;margin-top:11px}
  .guidelink{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;color:var(--bone-dim);
    text-decoration:none;border:1px solid var(--line);border-radius:20px;padding:8px 15px;display:inline-block}
  .guidelink:active{color:var(--bone)}

  /* bottom tab bar */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:20;
    background:linear-gradient(180deg,rgba(24,18,14,0.86),rgba(24,18,14,0.98));
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-top:1px solid var(--line-strong);
    padding-bottom:var(--safe-bottom)}
  .tabbar-inner{max-width:680px;margin:0 auto;display:flex;height:var(--bar-h)}
  .tabbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    background:transparent;border:none;cursor:pointer;font-family:var(--mono);font-size:10.5px;
    font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--bone-faint);
    padding-top:8px;position:relative}
  .tabbtn .glyph{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);font-style:italic;font-size:15px;font-weight:600;
    border:1.5px solid var(--line-strong);color:var(--bone-faint);transition:all .15s}
  .tabbtn.active{color:var(--bone)}
  .tabbtn.active::before{content:"";position:absolute;top:0;width:30px;height:2.5px;border-radius:2px}
  .tabbtn[data-tab="chad"].active{color:var(--bone)}
  .tabbtn[data-tab="chad"].active::before{background:var(--rust)}
  .tabbtn[data-tab="chad"].active .glyph{border-color:var(--rust);color:var(--rust);background:rgba(194,94,56,0.12)}
  .tabbtn[data-tab="joelle"].active::before{background:var(--gold)}
  .tabbtn[data-tab="joelle"].active .glyph{border-color:var(--gold);color:var(--gold);background:rgba(224,178,92,0.12)}
  .tabbtn[data-tab="shared"].active::before{background:var(--bone)}
  .tabbtn[data-tab="shared"].active .glyph{border-color:var(--bone);color:var(--bone)}
  .tabbtn:focus-visible{outline:2px solid var(--rust);outline-offset:-4px}

  /* save toast */
  #toast{position:fixed;left:50%;transform:translateX(-50%) translateY(8px);
    bottom:calc(var(--bar-h) + var(--safe-bottom) + 12px);z-index:30;
    font-family:var(--mono);font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;
    background:var(--ink-4);color:var(--gold);border:1px solid var(--line-strong);
    padding:8px 14px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .35s,transform .35s}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .loading{text-align:center;padding:64px 20px;font-family:var(--mono);font-size:12px;
    letter-spacing:0.2em;text-transform:uppercase;color:var(--bone-faint)}
</style>
</head>
<body>
<div class="wrap" id="root"><div class="loading">Loading the reel…</div></div>
<div id="toast"></div>

<script>
/* ================= Movie Club — Chad & Joelle =================
   Storage: PUT/GET /api/data (Cloudflare KV) for cross-device sync,
   mirrored to localStorage for instant + offline use. Falls back to
   localStorage, then in-memory, if no backend is reachable.
   Title search + posters via GET /api/search (TMDB if keyed, else iTunes).
   ============================================================== */
const API='/api/data';
const SEARCH='/api/search';
const LKEY='movieclub:data';
const SBKEY='movieclub:syncbox';   // shared "box" id for cross-phone sync
const SCHEMA_VERSION=1;   // bump when the data shape changes; import normalizes forward
const CATEGORIES=[
  {key:'plot',               label:'Plot',               desc:'story · structure'},
  {key:'writing',            label:'Writing',            desc:'script · dialogue'},
  {key:'pacing',             label:'Pacing',             desc:'flow · momentum'},
  {key:'actingPerformance',  label:'Acting — Performance',desc:'the performances'},
  {key:'actingCasting',      label:'Acting — Casting',   desc:'right people, right roles'},
  {key:'cinematography',     label:'Cinematography',     desc:'shots · lighting · look'},
  {key:'specialEffects',     label:'Special effects',    desc:'vfx · practical · stunts'},
  {key:'setCostumes',        label:'Set design & costumes',desc:'production design · wardrobe'},
  {key:'soundtrack',         label:'Soundtrack',         desc:'score · songs'},
  {key:'soundscape',         label:'Soundscape',         desc:'sound design · mix'},
  {key:'ending',             label:'Satisfying ending',  desc:'did it stick the landing'},
  {key:'predictability',     label:'Predictability',     desc:'predictable ↔ shocking', type:'slider', weight:0.5},
  {key:'enjoyment',          label:'Overall enjoyment',  desc:'all-in · would rewatch'},
];
/* Every category feeds the verdict. Predictability counts too (predictable =
   slightly negative, shocking = positive) but at half a normal category's
   weight, so it nudges the average without dominating it. */
const PRED_WEIGHT=0.5;
const PEOPLE={chad:'Chad',joelle:'Joelle'};
const PRED_WORDS=['Not rated','Totally predictable','Predictable','Even odds','Surprising','Genuinely shocking'];

let data={movies:[]};
let selectedId=null, activeTab='chad', sortMode='recent', newFormOpen=false;
let saveTimer=null, source='memory', syncBox='';
let suggTimer=null, suggList=[], pendingPick=null, pendingCover=null;

/* ---------- storage ---------- */
function mirrorLocal(){ try{ localStorage.setItem(LKEY, JSON.stringify(data)); }catch(e){} }
function readLocal(){ try{ const s=localStorage.getItem(LKEY); if(s){ const j=JSON.parse(s); if(j&&Array.isArray(j.movies)) return j; } }catch(e){} return null; }
function loadSyncBox(){ try{ return localStorage.getItem(SBKEY)||''; }catch(e){ return ''; } }
function saveSyncBox(id){ syncBox=id||''; try{ if(id) localStorage.setItem(SBKEY,id); else localStorage.removeItem(SBKEY); }catch(e){} }

async function loadData(){
  if(syncBox){
    try{
      const r=await fetch(`${API}?box=${encodeURIComponent(syncBox)}`,{cache:'no-store'});
      if(r.ok){ const j=await r.json(); if(j&&Array.isArray(j.movies)){ data=j; normalize(); mirrorLocal(); source='server'; return; } }
    }catch(e){}
  }
  const local=readLocal();
  if(local){ data=local; normalize(); source='local'; return; }
  source='memory';
}
function scheduleSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(saveData,450); }
async function saveData(){
  mirrorLocal();                       // instant + offline, every device
  if(!syncBox){ if(data.movies.length) source='local'; return; }
  toast('Saving…');
  try{
    const r=await fetch(`${API}?box=${encodeURIComponent(syncBox)}`,{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify(data)});
    if(r.ok){ source='server'; toast('Saved & synced'); return; }
    source='local'; toast('Saved on this iPhone');
  }catch(e){ source='local'; toast('Saved offline'); }
}

/* ---------- cross-phone sync (no account) ---------- */
async function enableSync(){
  toast('Setting up sync…');
  try{
    const r=await fetch(API,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(data)});
    const j=await r.json().catch(()=>null);
    if(r.ok&&j&&j.box){ saveSyncBox(j.box); source='server'; toast('Sync is on'); render(); return; }
  }catch(e){}
  toast('Could not start sync — try again');
}
async function adoptSync(code){
  const id=(code||'').trim().replace(/.*\/?sync=/,''); if(!id) return;
  if(data.movies.length && !confirm("Switch this phone to the shared list? It replaces the films currently on THIS phone (use Export first if you want a backup).")) return;
  saveSyncBox(id);
  await loadData();
  selectedId=data.movies[0]?data.movies[0].id:null;
  render(); toast(source==='server'?'Connected to shared list':'Saved code — could not reach it yet');
}
function disconnectSync(){
  if(!confirm('Stop syncing on this phone? Your films stay saved here, just not shared.')) return;
  saveSyncBox(''); source=data.movies.length?'local':'memory'; render(); toast('Sync turned off');
}
function copyLink(link,msg){
  const ok=msg||'Invite link copied';
  try{ navigator.clipboard.writeText(link).then(()=>toast(ok),()=>prompt('Copy this link:',link)); }
  catch(e){ prompt('Copy this link:',link); }
}
let toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast'); if(!el) return;
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),1600);
}

/* ---------- helpers ---------- */
function uid(){ return 'm'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function getMovie(id){ return data.movies.find(m=>m.id===id)||null; }
function blankPerson(){ const o={notes:''}; CATEGORIES.forEach(c=>o[c.key]=0); return o; }
function blank(){ return {chad:blankPerson(),joelle:blankPerson()}; }
function normalize(){
  if(!data||!Array.isArray(data.movies)){ data={movies:[]}; return; }
  data.movies.forEach(m=>{
    if(typeof m.poster!=='string') m.poster='';
    if(typeof m.year!=='string') m.year='';
    if(typeof m.genre!=='string') m.genre='';
    if(typeof m.includeGuests!=='boolean') m.includeGuests=false;
    if(!m.ratings||typeof m.ratings!=='object') m.ratings=blank();
    Object.keys(PEOPLE).forEach(p=>{
      const r=m.ratings[p]||(m.ratings[p]=blankPerson());
      CATEGORIES.forEach(c=>{ if(typeof r[c.key]!=='number') r[c.key]=0; });
      if(typeof r.notes!=='string') r.notes='';
    });
    if(!Array.isArray(m.guests)) m.guests=[];
    m.guests=m.guests.slice(0,3);
    m.guests.forEach(g=>{
      if(typeof g.id!=='string') g.id='g'+Math.random().toString(36).slice(2,7);
      if(typeof g.name!=='string') g.name='';
      if(!g.ratings||typeof g.ratings!=='object') g.ratings=blankPerson();
      CATEGORIES.forEach(c=>{ if(typeof g.ratings[c.key]!=='number') g.ratings[c.key]=0; });
      if(typeof g.ratings.notes!=='string') g.ratings.notes='';
    });
  });
}
function avgOf(r){ if(!r) return null; let sum=0,wsum=0;
  CATEGORIES.forEach(c=>{ const v=r[c.key]; if(v>0){ const w=c.weight||1; sum+=v*w; wsum+=w; } });
  return wsum?sum/wsum:null; }
function personAvg(m,p){ return avgOf(m.ratings[p]); }
function guestAvg(g){ return avgOf(g&&g.ratings); }
function firstName(n){ return (n||'').trim().split(/\s+/)[0]||''; }
function combinedAvg(m){ const vals=[personAvg(m,'chad'),personAvg(m,'joelle')];
  if(m.includeGuests) (m.guests||[]).forEach(g=>vals.push(guestAvg(g)));
  const a=vals.filter(x=>x!==null); return a.length?a.reduce((x,y)=>x+y,0)/a.length:null; }
function fmt(n){ return n===null?'—':(Math.round(n*10)/10).toFixed(1); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- mutations ---------- */
function addMovie(title,date,extra){ const t=(title||'').trim(); if(!t) return;
  const m={id:uid(),title:t,watched:date||'',year:(extra&&extra.year)||'',genre:(extra&&extra.genre)||'',poster:(extra&&extra.poster)||'',ratings:blank()};
  data.movies.unshift(m); selectedId=m.id; newFormOpen=false; pendingPick=null; pendingCover=null; scheduleSave(); render(); }
function deleteMovie(id){ const m=getMovie(id); if(!m) return;
  if(!confirm(`Remove "${m.title}" and both your ratings? This can't be undone.`)) return;
  data.movies=data.movies.filter(x=>x.id!==id);
  if(selectedId===id) selectedId=data.movies[0]?data.movies[0].id:null; scheduleSave(); render(); }
function renameMovie(id){ const m=getMovie(id); if(!m) return;
  const n=prompt('Movie title',m.title); if(n===null) return; const t=n.trim(); if(!t) return;
  m.title=t; scheduleSave(); render(); }
function editGenre(id){ const m=getMovie(id); if(!m) return;
  const n=prompt('Genre (e.g. Drama, Sci-Fi, Comedy)', m.genre||''); if(n===null) return;
  m.genre=n.trim(); scheduleSave(); render(); }
function toggleVerdict(id){ const m=getMovie(id); if(!m) return; m.includeGuests=!m.includeGuests; scheduleSave(); render(); }

/* ---------- guests (per movie, up to 3) ---------- */
function guestLink(m,g){
  return location.origin+'/rate.html?box='+encodeURIComponent(syncBox)+'&m='+encodeURIComponent(m.id)+'&gid='+encodeURIComponent(g.id)+(g.name?'&n='+encodeURIComponent(g.name):'');
}
async function addGuest(id){
  const m=getMovie(id); if(!m) return;
  if(!Array.isArray(m.guests)) m.guests=[];
  if(m.guests.length>=3){ toast('Up to 3 guests per film'); return; }
  if(!syncBox){
    if(!confirm('Guests rate from their own phone, so cross-phone sync needs to be on. Turn it on now?')) return;
    await enableSync();
    if(!syncBox){ toast('Could not turn on sync — try again'); return; }
  }
  const name=prompt('Guest name (e.g. Ashton)'); if(name===null) return;
  const g={id:'g'+Date.now().toString(36)+Math.random().toString(36).slice(2,4),name:(name||'').trim(),ratings:blankPerson()};
  m.guests.push(g); scheduleSave(); render();
  copyLink(guestLink(m,g),'Guest link copied — send it to '+(g.name||'your guest'));
}
function delGuest(id,gid){
  const m=getMovie(id); if(!m||!Array.isArray(m.guests)) return;
  const g=m.guests.find(x=>x.id===gid); if(!g) return;
  if(!confirm(`Remove ${g.name||'this guest'} and their rating?`)) return;
  m.guests=m.guests.filter(x=>x.id!==gid); scheduleSave(); render();
}
function setRating(id,p,cat,v){ const m=getMovie(id); if(!m) return;
  m.ratings[p][cat]=(m.ratings[p][cat]===v)?0:v; scheduleSave(); render(); }
function setNotes(id,p,text){ const m=getMovie(id); if(!m) return; m.ratings[p].notes=text; scheduleSave(); }

/* ---------- render ---------- */
function render(){
  const root=document.getElementById('root');
  if(!selectedId && data.movies.length) selectedId=data.movies[0].id;
  root.innerHTML=`
    <header class="app-head">
      <div class="eyebrow">The Stewart Screening Room</div>
      <h1 class="title">Movie&nbsp;Club</h1>
      <div class="sub">Chad <span style="color:var(--gold)">+</span> Joelle · rated out of five</div>
    </header>
    <div class="marquee">
      <span class="marquee-label">Now rating</span>
      <div class="marquee-row">
        ${data.movies.length?movieSelectHTML():`<div style="flex:1;display:flex;align-items:center;font-family:var(--serif);font-style:italic;color:var(--bone-faint);font-size:17px">No films logged yet</div>`}
        <button class="btn btn-add" id="toggleNew">${newFormOpen?'Close':'＋'}</button>
      </div>
      <div class="newform ${newFormOpen?'open':''}">
        <div class="field"><label>Movie title</label>
          <div class="ac-wrap">
            <input id="newTitle" type="text" placeholder="Start typing a title…" autocomplete="off" enterkeyhint="done" />
            <div id="suggBox" class="suggbox" role="listbox" aria-label="Movie suggestions"></div>
          </div>
        </div>
        <div id="pickPreview" class="pickprev" hidden></div>
        <button class="btn" id="uploadCover" type="button" style="min-height:44px">⤒ Upload cover image (optional)</button>
        <div class="field"><label>Watched on (optional)</label><input id="newDate" type="date" /></div>
        <button class="btn btn-add" id="saveNew" style="min-height:50px">Add film</button>
      </div>
    </div>
    <section class="panel ${activeTab==='chad'?'active':''}">${personPanel('chad')}</section>
    <section class="panel ${activeTab==='joelle'?'active':''}">${personPanel('joelle')}</section>
    <section class="panel ${activeTab==='shared'?'active':''}">${sharedPanel()}</section>
    <div class="syncline">${source==='server'?'Synced for both of you':source==='local'?'Saved on this iPhone':'Preview · not yet synced'}</div>
    <div class="guideline"><a class="guidelink" href="/guide.html">❓ How to use Movie Club</a></div>
    <nav class="tabbar"><div class="tabbar-inner">
      <button class="tabbtn ${activeTab==='chad'?'active':''}" data-tab="chad"><span class="glyph">C</span>Chad</button>
      <button class="tabbtn ${activeTab==='joelle'?'active':''}" data-tab="joelle"><span class="glyph">J</span>Joelle</button>
      <button class="tabbtn ${activeTab==='shared'?'active':''}" data-tab="shared"><span class="glyph">★</span>Shared</button>
    </div></nav>`;
  wire();
}
function movieSelectHTML(){
  const opts=data.movies.map(m=>{ const cv=combinedAvg(m); const tag=cv===null?'':`  ·  ${fmt(cv)}★`;
    return `<option value="${m.id}" ${m.id===selectedId?'selected':''}>${esc(m.title)}${tag}</option>`; }).join('');
  return `<select id="movieSelect" aria-label="Choose film to rate">${opts}</select>`;
}
function starsHTML(p,cat,val){ let s='';
  for(let i=1;i<=5;i++) s+=`<span class="star ${i<=val?'on':''}" role="button" tabindex="0" aria-label="${cat} ${i} of 5" data-act="star" data-person="${p}" data-cat="${cat}" data-val="${i}">★</span>`;
  return s; }
function starCatHTML(p,c,val){
  return `<div class="cat"><div class="cat-head"><span class="cat-name">${c.label}</span><span class="cat-desc">${c.desc}</span></div>
    <div class="stars">${starsHTML(p,c.key,val)}<span class="catscore">${val?val+'/5':'—'}</span></div></div>`;
}
function sliderCatHTML(p,c,val){
  const v=val||0;
  return `<div class="cat"><div class="cat-head"><span class="cat-name">${c.label}</span><span class="cat-desc">${c.desc}</span></div>
    <div class="slider-row">
      <span class="slabel">Predictable</span>
      <input type="range" class="slider ${v?'':'unset'}" min="0" max="5" step="1" value="${v}"
        data-act="slider" data-person="${p}" data-cat="${c.key}" aria-label="${c.label} — predictable to shocking" />
      <span class="slabel">Shocking</span>
    </div>
    <div class="slider-read"><span class="sread ${v?'':'none'}" data-read="${p}-${c.key}">${PRED_WORDS[v]}</span>${v?`<button class="clearpred" data-act="clearpred" data-person="${p}" data-cat="${c.key}">clear</button>`:''}</div>
  </div>`;
}
function posterHTML(m,cls,ph){ return m.poster?`<img class="${cls}" src="${esc(m.poster)}" alt="" loading="lazy" />`:`<div class="${cls} ph">${ph}</div>`; }
function personPanel(p){
  if(!data.movies.length) return `<div class="empty"><div class="big">Nothing on the bill yet</div><div class="small">Tap ＋ to add the first film<br>you watched together.</div></div>`;
  const m=getMovie(selectedId); if(!m) return '';
  const r=m.ratings[p], avg=personAvg(m,p);
  const cats=CATEGORIES.map(c=> c.type==='slider' ? sliderCatHTML(p,c,r[c.key]) : starCatHTML(p,c,r[c.key]) ).join('');
  return `<div class="card">
    <div class="nowhead">${posterHTML(m,'nowposter','🎬')}
      <div><div class="nowtitle">${esc(m.title)}</div>
        <div class="nowmeta">${PEOPLE[p]}'s scorecard${avg!==null?`  ·  avg ${fmt(avg)}/5`:''}${m.year?`  ·  ${esc(m.year)}`:''}${m.watched?`  ·  seen ${esc(m.watched)}`:''}</div>
        <div class="gtags"><button class="gchip ${m.genre?'':'empty'}" data-act="genre" data-id="${m.id}">${m.genre?esc(m.genre):'＋ Genre'}</button></div></div>
    </div>
    ${cats}
    <div class="notes-wrap"><label for="notes-${p}">${PEOPLE[p]}'s notes</label>
      <textarea class="notes" id="notes-${p}" data-person="${p}" placeholder="Best scene, gripes, who picked it…">${esc(r.notes)}</textarea></div>
    ${guestSectionHTML(m)}
    <div class="card-foot">
      <button class="mini" data-act="rename" data-id="${m.id}">Rename</button>
      <button class="mini" data-act="genre" data-id="${m.id}">Edit genre</button>
      <button class="mini" data-act="cover" data-id="${m.id}">${m.poster?'Change cover':'Add cover'}</button>
      <button class="mini danger" data-act="delete" data-id="${m.id}">Remove film</button>
    </div></div>`;
}
function guestSectionHTML(m){
  const guests=m.guests||[];
  const rows=guests.map(g=>{
    const a=guestAvg(g);
    return `<div class="guestrow">
      <div class="ginfo"><span class="gnm">${esc(g.name||'Guest')}</span><span class="gst">${a!==null?fmt(a)+'/5':'invite sent · not rated yet'}</span></div>
      <div class="gacts">
        <button class="mini" data-act="gcopy" data-link="${esc(guestLink(m,g))}">Copy link</button>
        <button class="mini danger" data-act="gdel" data-id="${m.id}" data-gid="${g.id}">✕</button>
      </div></div>`;
  }).join('');
  return `<div class="guests-wrap">
    <div class="guests-h">Movie-night guests <span>${guests.length}/3</span></div>
    ${rows||'<div class="guests-empty">Having people over? Add up to 3 guests — each gets a private link to rate just this film from their own phone.</div>'}
    ${guests.length<3?`<button class="mini gadd" data-act="gadd" data-id="${m.id}">＋ Add a guest</button>`:''}
  </div>`;
}
function sharedPanel(){
  if(!data.movies.length) return `<div class="empty"><div class="big">Your shared shelf is empty</div><div class="small">Once you've both rated a film,<br>the combined verdicts land here.</div></div>`+syncToolsHTML()+dataToolsHTML();
  const rated=data.movies.filter(m=>combinedAvg(m)!==null);
  let top=null,split=null,gap=-1;
  rated.forEach(m=>{ if(!top||combinedAvg(m)>combinedAvg(top)) top=m;
    const c=personAvg(m,'chad'),j=personAvg(m,'joelle'); if(c!==null&&j!==null){ const g=Math.abs(c-j); if(g>gap){gap=g;split=m;} } });
  const stats=`<div class="summary-top">
    <div class="stat"><div class="k">Films logged</div><div class="v">${data.movies.length}</div></div>
    <div class="stat"><div class="k">Top verdict</div><div class="v">${top?esc(top.title):'—'}${top?` <small>${fmt(combinedAvg(top))}</small>`:''}</div></div>
    ${split?`<div class="stat"><div class="k">Biggest split</div><div class="v">${esc(split.title)} <small>Δ${fmt(gap)}</small></div></div>`:''}</div>`;
  const sorted=[...data.movies];
  if(sortMode==='top') sorted.sort((a,b)=>{ const av=combinedAvg(a),bv=combinedAvg(b);
    if(av===null&&bv===null) return 0; if(av===null) return 1; if(bv===null) return -1; return bv-av; });
  const sorts=`<div class="sorts"><span class="lbl">Sort</span>
    <button class="chip ${sortMode==='recent'?'on':''}" data-sort="recent">Most recent</button>
    <button class="chip ${sortMode==='top'?'on':''}" data-sort="top">Top rated</button></div>`;
  const rows=sorted.map(m=>{ const c=personAvg(m,'chad'),j=personAvg(m,'joelle'),cv=combinedAvg(m);
    const cn=m.ratings.chad.notes.trim(),jn=m.ratings.joelle.notes.trim();
    const cp=m.ratings.chad.predictability,jp=m.ratings.joelle.predictability;
    const ratedGuests=(m.guests||[]).filter(g=>guestAvg(g)!==null);
    const predline=(cp||jp)?`<div class="predline"><span class="pl-k">Predictability</span>${cp?`Chad <b>${PRED_WORDS[cp]}</b>`:''}${cp&&jp?'  ·  ':''}${jp?`Joelle <b>${PRED_WORDS[jp]}</b>`:''}</div>`:'';
    const guestBars=ratedGuests.map(g=>{ const ga=guestAvg(g);
      return `<div class="pscore"><span class="who" title="${esc(g.name||'Guest')}">${esc(firstName(g.name)||'Guest')}</span><span class="meter"><span class="guest" style="width:${ga/5*100}%"></span></span><span class="pnum">${fmt(ga)}</span></div>`; }).join('');
    let noteItems=[];
    if(cn) noteItems.push({who:'Chad',cls:'c',text:cn});
    if(jn) noteItems.push({who:'Joelle',cls:'j',text:jn});
    (m.guests||[]).forEach(g=>{ const t=(g.ratings.notes||'').trim(); if(t) noteItems.push({who:g.name||'Guest',cls:'g',text:t}); });
    const notes=noteItems.length?`<div class="twonotes">${noteItems.map(it=>`<div class="qnote"><div class="qwho ${it.cls}">${esc(it.who)}</div><div class="qtext">${esc(it.text)}</div></div>`).join('')}</div>`:'';
    return `<div class="filmrow"><div class="filmrow-head">${m.poster?posterHTML(m,'frposter',''):''}
      <div class="frmain"><div class="ftitle">${esc(m.title)}</div>${(m.year||m.watched)?`<div class="fdate">${m.year?esc(m.year):''}${m.year&&m.watched?' · ':''}${m.watched?`watched ${esc(m.watched)}`:''}</div>`:''}${m.genre?`<div class="gtags"><span class="gchip">${esc(m.genre)}</span></div>`:''}</div>
      <div class="verdict"><div class="vnum ${cv===null?'empty':''}">${fmt(cv)}</div><div class="vlbl">${m.includeGuests?"Everyone's verdict":'Shared verdict'}</div>${ratedGuests.length?`<button class="vtoggle ${m.includeGuests?'on':''}" data-act="vtoggle" data-id="${m.id}">${m.includeGuests?'✓ incl. guests':'＋ include guests'}</button>`:''}</div></div>
      <div class="scorebars">
        <div class="pscore"><span class="who">Chad</span><span class="meter"><span class="chad" style="width:${c?(c/5*100):0}%"></span></span><span class="pnum ${c===null?'none':''}">${fmt(c)}</span></div>
        <div class="pscore"><span class="who">Joelle</span><span class="meter"><span class="joelle" style="width:${j?(j/5*100):0}%"></span></span><span class="pnum ${j===null?'none':''}">${fmt(j)}</span></div>
        ${guestBars}
      </div>${predline}${notes}
      <div class="filmrow-foot"><button class="mini" data-act="rate" data-id="${m.id}">Open &amp; rate</button>
        <button class="mini" data-act="rename" data-id="${m.id}">Rename</button>
        <button class="mini danger" data-act="delete" data-id="${m.id}">Remove</button></div></div>`; }).join('');
  return stats+sorts+rows+syncToolsHTML()+dataToolsHTML();
}

/* ---------- title search / autocomplete ---------- */
function showSuggHint(msg){ const box=document.getElementById('suggBox'); if(!box) return;
  suggList=[]; box.innerHTML=`<div class="sugg-hint">${esc(msg)}</div>`; box.classList.add('open'); }
function querySuggest(q){
  clearTimeout(suggTimer);
  const box=document.getElementById('suggBox'); const term=(q||'').trim();
  if(term.length<2){ if(box){ box.innerHTML=''; box.classList.remove('open'); } return; }
  suggTimer=setTimeout(async()=>{
    showSuggHint('Searching…');
    try{
      const r=await fetch(`${SEARCH}?q=${encodeURIComponent(term)}`,{cache:'no-store'});
      if(!r.ok){ showSuggHint('Search unavailable — you can still type the title and add it by hand'); return; }
      const d=await r.json(); const list=Array.isArray(d.results)?d.results:[];
      if(!list.length){ showSuggHint(d&&d.source==='none'?'Search is down right now — add the title by hand':'No matches — type the full title and add it by hand'); return; }
      renderSuggest(list);
    }catch(e){ showSuggHint('Search unavailable — you can still type the title and add it by hand'); }
  },220);
}
function renderSuggest(list){
  suggList=list;
  const box=document.getElementById('suggBox'); if(!box) return;
  if(!list.length){ box.innerHTML=`<div class="sugg-hint">No matches — you can still add the title by hand</div>`; box.classList.add('open'); return; }
  box.innerHTML=list.map((m,i)=>{ const meta=[esc(m.year),esc(m.genre)].filter(Boolean).join(' · ');
    return `<button type="button" class="sugg" data-idx="${i}" role="option">
    ${m.poster?`<img class="sugg-img" src="${esc(m.poster)}" alt="" loading="lazy" />`:`<span class="sugg-img ph">🎞</span>`}
    <span class="sugg-meta"><span class="sugg-title">${esc(m.title)}</span>${meta?`<span class="sugg-year">${meta}</span>`:''}</span>
  </button>`; }).join('');
  box.classList.add('open');
  box.querySelectorAll('.sugg').forEach(b=>b.addEventListener('click',()=>pickSuggest(+b.dataset.idx)));
}
function pickSuggest(i){
  const m=suggList[i]; if(!m) return;
  pendingPick={title:m.title,year:m.year||'',genre:m.genre||'',poster:m.poster||''};
  const nt=document.getElementById('newTitle'); if(nt) nt.value=m.title;
  const box=document.getElementById('suggBox'); if(box){ box.innerHTML=''; box.classList.remove('open'); }
  updatePickPreview();
}
function updatePickPreview(){
  const el=document.getElementById('pickPreview'); if(!el) return;
  const nt=document.getElementById('newTitle');
  const poster=pendingCover||(pendingPick&&pendingPick.poster)||'';
  if(poster){
    el.hidden=false;
    const title=(pendingPick&&pendingPick.title)||(nt?nt.value:'')||'Cover ready';
    const meta=[esc(pendingPick&&pendingPick.year),esc(pendingPick&&pendingPick.genre)].filter(Boolean).join(' · ');
    el.innerHTML=`<img src="${esc(poster)}" alt="" /><div><div class="pp-t">${esc(title)}</div>${meta?`<div class="pp-y">${meta}</div>`:''}</div>`;
  }else{ el.hidden=true; el.innerHTML=''; }
}
function commitNew(){
  const nt=document.getElementById('newTitle'), nd=document.getElementById('newDate');
  const t=nt?nt.value:'', d=nd?nd.value:'';
  let extra=(pendingPick&&pendingPick.title.toLowerCase()===t.trim().toLowerCase())?{...pendingPick}:null;
  if(pendingCover){ extra=extra||{}; extra.poster=pendingCover; }
  addMovie(t,d,extra);
}

/* ---------- cover image upload ---------- */
/* Read a chosen image file, downscale it (longest side 400px) and hand back a
   compact JPEG data URL so it travels inside the JSON blob / backups. */
function fileToPoster(file,cb){
  if(!file){ return; }
  const reader=new FileReader();
  reader.onload=()=>{ const img=new Image();
    img.onload=()=>{ const MAX=400; const scale=Math.min(1,MAX/Math.max(img.width,img.height));
      const w=Math.max(1,Math.round(img.width*scale)), h=Math.max(1,Math.round(img.height*scale));
      try{ const c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h); cb(c.toDataURL('image/jpeg',0.82)); }
      catch(e){ cb(reader.result); } };
    img.onerror=()=>cb(reader.result);
    img.src=reader.result; };
  reader.readAsDataURL(file);
}
function chooseImage(handler){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(f) fileToPoster(f,handler); };
  inp.click();
}
function pickCover(id){ chooseImage(url=>{ const m=getMovie(id); if(!m) return; m.poster=url; scheduleSave(); render(); toast('Cover updated'); }); }
function pickCoverForNew(){ chooseImage(url=>{ pendingCover=url; updatePickPreview(); toast('Cover ready'); }); }

/* ---------- export / import (state file) ---------- */
function exportData(){
  const payload={app:'movie-club',schema:SCHEMA_VERSION,exported:new Date().toISOString(),data};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=`movie-club-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },0); toast('Exported');
}
function importData(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json,.json';
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=()=>{ let j; try{ j=JSON.parse(reader.result); }catch(e){ alert('Could not read that file — is it valid JSON?'); return; }
      const movies = Array.isArray(j&&j.movies) ? j.movies : (j&&j.data&&Array.isArray(j.data.movies) ? j.data.movies : null);
      if(!movies){ alert("That file doesn't look like a Movie Club backup."); return; }
      if(data.movies.length && !confirm(`Replace your current ${data.movies.length} film(s) with ${movies.length} from this backup? This overwrites what's here.`)) return;
      data={movies}; normalize(); selectedId=data.movies[0]?data.movies[0].id:null; scheduleSave(); render(); toast(`Imported ${movies.length} films`); };
    reader.readAsText(f); };
  inp.click();
}
function dataToolsHTML(){
  return `<div class="datatools">
      <button class="mini" data-act="export">⤓ Export data (.json)</button>
      <button class="mini" data-act="import">⤒ Import data</button>
    </div>
    <div class="datahint">Back up your ratings to a file, or restore them — handy when rolling forward to new versions.</div>`;
}
function syncToolsHTML(){
  if(syncBox){
    const url=location.origin+'/?sync='+encodeURIComponent(syncBox);
    return `<div class="syncbox">
      <div class="syncbox-h">✓ Cross-phone sync is on</div>
      <div class="syncbox-p">Add your other phone: open this invite link on it, or enter the code by hand.</div>
      <div class="synccode">${esc(syncBox)}</div>
      <div class="syncbtns">
        <button class="btn btn-add" data-act="copylink" data-link="${esc(url)}" style="min-height:44px">Copy invite link</button>
        <button class="mini" data-act="adopt">Enter a code</button>
        <button class="mini danger" data-act="syncoff">Turn off</button>
      </div></div>`;
  }
  return `<div class="syncbox">
    <div class="syncbox-h">Share with your other phone</div>
    <div class="syncbox-p">Turn on sync here, then open the invite link on your partner's phone. No account, no setup — both phones share one list.</div>
    <div class="syncbtns">
      <button class="btn btn-add" data-act="syncon" style="min-height:46px">Turn on cross-phone sync</button>
      <button class="mini" data-act="adopt">I already have a code</button>
    </div></div>`;
}

/* ---------- events ---------- */
function wire(){
  const root=document.getElementById('root');
  root.querySelectorAll('.tabbtn').forEach(t=>t.addEventListener('click',()=>{activeTab=t.dataset.tab;render();window.scrollTo({top:0,behavior:'smooth'});}));
  const sel=document.getElementById('movieSelect');
  if(sel) sel.addEventListener('change',e=>{selectedId=e.target.value;render();});
  const tg=document.getElementById('toggleNew');
  if(tg) tg.addEventListener('click',()=>{newFormOpen=!newFormOpen;pendingPick=null;pendingCover=null;render();if(newFormOpen)setTimeout(()=>document.getElementById('newTitle')?.focus(),40);});
  const sn=document.getElementById('saveNew');
  if(sn) sn.addEventListener('click',commitNew);
  const uc=document.getElementById('uploadCover');
  if(uc) uc.addEventListener('click',pickCoverForNew);
  const nt=document.getElementById('newTitle');
  if(nt){
    nt.addEventListener('input',()=>{ pendingPick=null; updatePickPreview(); querySuggest(nt.value); });
    nt.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); commitNew(); } });
  }
  root.querySelectorAll('[data-act="star"]').forEach(s=>{
    const fire=()=>setRating(selectedId,s.dataset.person,s.dataset.cat,+s.dataset.val);
    s.addEventListener('click',fire);
    s.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();fire();}});});
  root.querySelectorAll('[data-act="slider"]').forEach(sl=>{
    sl.addEventListener('input',()=>{ const v=+sl.value; const m=getMovie(selectedId); if(!m) return;
      m.ratings[sl.dataset.person][sl.dataset.cat]=v;
      const rd=root.querySelector(`[data-read="${sl.dataset.person}-${sl.dataset.cat}"]`);
      if(rd){ rd.textContent=PRED_WORDS[v]; rd.classList.toggle('none',!v); }
      sl.classList.toggle('unset',!v); scheduleSave(); });
    sl.addEventListener('change',()=>render());   // refresh the "clear" affordance
  });
  root.querySelectorAll('[data-act="clearpred"]').forEach(b=>b.addEventListener('click',()=>{
    const m=getMovie(selectedId); if(!m) return; m.ratings[b.dataset.person][b.dataset.cat]=0; scheduleSave(); render(); }));
  root.querySelectorAll('textarea.notes').forEach(ta=>ta.addEventListener('input',()=>setNotes(selectedId,ta.dataset.person,ta.value)));
  root.querySelectorAll('[data-sort]').forEach(c=>c.addEventListener('click',()=>{sortMode=c.dataset.sort;render();}));
  root.querySelectorAll('[data-act="rate"]').forEach(b=>b.addEventListener('click',()=>{selectedId=b.dataset.id;activeTab='chad';render();window.scrollTo({top:0,behavior:'smooth'});}));
  root.querySelectorAll('[data-act="rename"]').forEach(b=>b.addEventListener('click',()=>renameMovie(b.dataset.id)));
  root.querySelectorAll('[data-act="genre"]').forEach(b=>b.addEventListener('click',()=>editGenre(b.dataset.id)));
  root.querySelectorAll('[data-act="cover"]').forEach(b=>b.addEventListener('click',()=>pickCover(b.dataset.id)));
  root.querySelectorAll('[data-act="export"]').forEach(b=>b.addEventListener('click',exportData));
  root.querySelectorAll('[data-act="import"]').forEach(b=>b.addEventListener('click',importData));
  root.querySelectorAll('[data-act="syncon"]').forEach(b=>b.addEventListener('click',enableSync));
  root.querySelectorAll('[data-act="syncoff"]').forEach(b=>b.addEventListener('click',disconnectSync));
  root.querySelectorAll('[data-act="adopt"]').forEach(b=>b.addEventListener('click',()=>adoptSync(prompt('Paste the sync code (or invite link) from your other phone:'))));
  root.querySelectorAll('[data-act="copylink"]').forEach(b=>b.addEventListener('click',()=>copyLink(b.dataset.link)));
  root.querySelectorAll('[data-act="gadd"]').forEach(b=>b.addEventListener('click',()=>addGuest(b.dataset.id)));
  root.querySelectorAll('[data-act="gcopy"]').forEach(b=>b.addEventListener('click',()=>copyLink(b.dataset.link,'Guest link copied')));
  root.querySelectorAll('[data-act="gdel"]').forEach(b=>b.addEventListener('click',()=>delGuest(b.dataset.id,b.dataset.gid)));
  root.querySelectorAll('[data-act="vtoggle"]').forEach(b=>b.addEventListener('click',()=>toggleVerdict(b.dataset.id)));
  root.querySelectorAll('[data-act="delete"]').forEach(b=>b.addEventListener('click',()=>deleteMovie(b.dataset.id)));
}

/* pull latest when returning to the app (other phone may have rated) */
document.addEventListener('visibilitychange',async()=>{
  if(document.visibilityState!=='visible'||!syncBox) return;
  const ae=document.activeElement; if(ae&&/INPUT|TEXTAREA/.test(ae.tagName)) return;
  try{ const r=await fetch(`${API}?box=${encodeURIComponent(syncBox)}`,{cache:'no-store'}); if(r.ok){ const j=await r.json();
    if(j&&Array.isArray(j.movies)){ data=j; normalize(); mirrorLocal(); if(selectedId&&!getMovie(selectedId)) selectedId=data.movies[0]?.id||null; render(); } } }catch(e){}
});

/* boot */
(async function(){
  syncBox=loadSyncBox();
  try{ const u=new URL(location.href); const incoming=(u.searchParams.get('sync')||'').trim();
    if(incoming && incoming!==syncBox){
      if(!syncBox || confirm('Open the shared movie list on this phone?')) saveSyncBox(incoming);
      u.searchParams.delete('sync'); history.replaceState(null,'',u.pathname+(u.search||'')+u.hash);
    } }catch(e){}
  await loadData(); if(data.movies.length) selectedId=data.movies[0].id; render();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{}); })();
</script>
