<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Rate a film · Movie Club</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#181210" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500;1,9..144,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#181210; --ink-2:#211810; --ink-3:#2b2017; --ink-4:#352819;
    --bone:#ece0cc; --bone-dim:#a4937c; --bone-faint:#6d6051;
    --rust:#c25e38; --gold:#e0b25c; --gold-dim:#7a6233;
    --line:rgba(236,224,204,0.10); --line-strong:rgba(236,224,204,0.18);
    --mono:'JetBrains Mono',ui-monospace,monospace; --serif:'Fraunces',Georgia,serif;
    --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{background:
      radial-gradient(120% 70% at 50% -5%, rgba(194,94,56,0.12), transparent 55%),
      radial-gradient(90% 50% at 110% 108%, rgba(224,178,92,0.07), transparent 55%),
      var(--ink);
    background-attachment:fixed;color:var(--bone);font-family:var(--serif);-webkit-font-smoothing:antialiased;
    min-height:100dvh;padding:calc(var(--safe-top) + 16px) 16px calc(var(--safe-bottom) + 28px)}
  .wrap{max-width:600px;margin:0 auto}
  .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--rust);font-weight:500;text-align:center}
  .gbanner{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);
    text-align:center;border:1px solid var(--gold-dim);border-radius:20px;padding:7px 14px;display:inline-block;margin:12px auto 0}
  .center{text-align:center}

  .head{display:flex;gap:14px;align-items:flex-start;margin:18px 0 8px;
    background:linear-gradient(180deg,var(--ink-2),var(--ink));border:1px solid var(--line);border-radius:15px;padding:16px}
  .poster{width:64px;height:96px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--ink-3);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:26px}
  .htitle{font-family:var(--serif);font-style:italic;font-weight:500;font-size:24px;line-height:1.05}
  .hmeta{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--bone-faint);margin-top:7px;line-height:1.6}

  .field{margin:14px 0}
  .field label{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--bone-dim);display:block;margin-bottom:7px}
  .field input{width:100%;min-width:0;max-width:100%;background:var(--ink);color:var(--bone);font-family:var(--serif);font-size:16px;
    border:1px solid var(--line-strong);border-radius:10px;padding:13px}
  .field input:focus-visible{outline:2px solid var(--rust);outline-offset:1px}

  .card{background:linear-gradient(180deg,var(--ink-2),var(--ink));border:1px solid var(--line);border-radius:15px;padding:17px}
  .cat{padding:13px 0;border-top:1px solid var(--line)}
  .cat:first-child{border-top:none;padding-top:2px}
  .cat-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:7px}
  .cat-name{font-family:var(--serif);font-size:18px;font-weight:600}
  .cat-desc{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--bone-faint);text-align:right}
  .stars{display:flex;align-items:center}
  .star{font-size:32px;line-height:1;cursor:pointer;color:var(--ink-4);padding:5px 6px;margin:-3px 0;
    user-select:none;-webkit-text-stroke:1.4px var(--gold-dim)}
  .star.on{color:var(--gold);-webkit-text-stroke:0}
  .star:active{transform:scale(1.15)}
  .catscore{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--bone-dim);font-weight:600}

  .slider-row{display:flex;align-items:center;gap:11px}
  .slabel{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--bone-faint);white-space:nowrap}
  input.slider{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;
    background:linear-gradient(90deg,var(--rust),var(--gold));outline:none;margin:6px 0}
  input.slider.unset{background:var(--ink-4)}
  input.slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--bone);border:2px solid var(--ink);box-shadow:0 2px 6px rgba(0,0,0,0.5)}
  input.slider::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--bone);border:2px solid var(--ink)}
  .slider-read{margin-top:9px;font-family:var(--mono);font-size:11px;color:var(--gold);font-weight:600;text-align:center}
  .slider-read.none{color:var(--bone-faint);font-weight:400}

  textarea.notes{width:100%;min-height:96px;resize:vertical;background:var(--ink);color:var(--bone);font-family:var(--serif);
    font-size:16px;line-height:1.5;border:1px solid var(--line-strong);border-radius:12px;padding:13px}
  textarea.notes:focus-visible{outline:2px solid var(--rust);outline-offset:1px}

  .submit{width:100%;font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:0.03em;
    background:var(--rust);color:#fff;border:none;border-radius:13px;padding:17px;margin-top:18px;cursor:pointer}
  .submit:active{transform:translateY(1px)}
  .submit[disabled]{opacity:.5}

  .state{text-align:center;padding:70px 16px}
  .state .big{font-family:var(--serif);font-style:italic;font-size:26px;margin-bottom:10px}
  .state .small{font-family:var(--mono);font-size:12px;color:var(--bone-dim);line-height:1.8}
  .state .tick{font-size:46px;margin-bottom:14px}
  a.applink{display:inline-block;margin-top:22px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;
    color:var(--bone-dim);text-decoration:none;border:1px solid var(--line-strong);border-radius:20px;padding:11px 20px}
  .loading{text-align:center;padding:80px 16px;font-family:var(--mono);font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:var(--bone-faint)}
</style>
</head>
<body>
<div class="wrap" id="root"><div class="loading">Loading the film…</div></div>
<script>
const API='/api/data';
const CATEGORIES=[
  {key:'plot',label:'Plot',desc:'story · structure'},
  {key:'writing',label:'Writing',desc:'script · dialogue'},
  {key:'pacing',label:'Pacing',desc:'flow · momentum'},
  {key:'actingPerformance',label:'Acting — Performance',desc:'the performances'},
  {key:'actingCasting',label:'Acting — Casting',desc:'right people, right roles'},
  {key:'cinematography',label:'Cinematography',desc:'shots · lighting · look'},
  {key:'specialEffects',label:'Special effects',desc:'vfx · practical · stunts'},
  {key:'setCostumes',label:'Set design & costumes',desc:'production design · wardrobe'},
  {key:'soundtrack',label:'Soundtrack',desc:'score · songs'},
  {key:'soundscape',label:'Soundscape',desc:'sound design · mix'},
  {key:'ending',label:'Satisfying ending',desc:'did it stick the landing'},
  {key:'predictability',label:'Predictability',desc:'predictable ↔ shocking',type:'slider'},
  {key:'enjoyment',label:'Overall enjoyment',desc:'all-in · would rewatch'},
];
const PRED_WORDS=['Not rated','Totally predictable','Predictable','Even odds','Surprising','Genuinely shocking'];
const qs=new URLSearchParams(location.search);
const box=(qs.get('box')||'').trim(), mid=(qs.get('m')||'').trim(), gid=(qs.get('gid')||'').trim();
let data=null, movie=null, name=(qs.get('n')||'').trim(), r=blank(), submitting=false;

function blank(){ const o={notes:''}; CATEGORIES.forEach(c=>o[c.key]=0); return o; }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function stateScreen(big,small){ document.getElementById('root').innerHTML=
  `<div class="state"><div class="big">${big}</div><div class="small">${small}</div><a class="applink" href="/">Open Movie Club</a></div>`; }

async function boot(){
  if(!box||!mid){ stateScreen('Invalid link','This guest link is missing some details.<br>Ask your host to send a fresh one.'); return; }
  try{
    const res=await fetch(`${API}?box=${encodeURIComponent(box)}`,{cache:'no-store'});
    const j=await res.json();
    if(j&&Array.isArray(j.movies)){ data=j; movie=j.movies.find(m=>m.id===mid)||null; }
  }catch(e){}
  if(!data){ stateScreen('Can’t reach the list','We couldn’t load the movie list right now.<br>Check your connection and reload.'); return; }
  if(!movie){ stateScreen('Film not found','This film may have been removed.<br>Ask your host for a new link.'); return; }
  // prefill from an existing guest entry if present
  const g=(movie.guests||[]).find(x=>x.id===gid);
  if(g){ if(g.name&&!name) name=g.name; CATEGORIES.forEach(c=>{ if(typeof g.ratings[c.key]==='number') r[c.key]=g.ratings[c.key]; }); r.notes=g.ratings.notes||''; }
  render();
}

function starsHTML(cat,val){ let s='';
  for(let i=1;i<=5;i++) s+=`<span class="star ${i<=val?'on':''}" data-act="star" data-cat="${cat}" data-val="${i}">★</span>`;
  return s; }
function catHTML(c){
  if(c.type==='slider'){ const v=r[c.key]||0;
    return `<div class="cat"><div class="cat-head"><span class="cat-name">${c.label}</span><span class="cat-desc">${c.desc}</span></div>
      <div class="slider-row"><span class="slabel">Predictable</span>
      <input type="range" class="slider ${v?'':'unset'}" min="0" max="5" step="1" value="${v}" data-act="slider" data-cat="${c.key}" />
      <span class="slabel">Shocking</span></div>
      <div class="slider-read ${v?'':'none'}" id="read-${c.key}">${PRED_WORDS[v]}</div></div>`;
  }
  const val=r[c.key]||0;
  return `<div class="cat"><div class="cat-head"><span class="cat-name">${c.label}</span><span class="cat-desc">${c.desc}</span></div>
    <div class="stars">${starsHTML(c.key,val)}<span class="catscore">${val?val+'/5':'—'}</span></div></div>`;
}
function render(){
  const meta=[esc(movie.year),esc(movie.genre)].filter(Boolean).join(' · ');
  document.getElementById('root').innerHTML=`
    <div class="center"><div class="eyebrow">The Stewart Screening Room</div>
      <div class="gbanner">You're rating as a guest</div></div>
    <div class="head">${movie.poster?`<img class="poster" src="${esc(movie.poster)}" alt="" />`:`<div class="poster">🎬</div>`}
      <div><div class="htitle">${esc(movie.title)}</div><div class="hmeta">${meta||'Rate this film below'}</div></div></div>
    <div class="field"><label>Your name</label>
      <input id="gname" type="text" placeholder="e.g. Ashton" value="${esc(name)}" autocomplete="off" /></div>
    <div class="card">${CATEGORIES.map(catHTML).join('')}
      <div class="cat"><div class="cat-head"><span class="cat-name">Notes</span></div>
        <textarea class="notes" id="gnotes" placeholder="Best scene, gripes, who picked it…">${esc(r.notes)}</textarea></div>
    </div>
    <button class="submit" id="submit">${submitting?'Submitting…':'Submit my ratings'}</button>`;
  wire();
}
function wire(){
  const root=document.getElementById('root');
  root.querySelectorAll('[data-act="star"]').forEach(s=>s.addEventListener('click',()=>{
    const cat=s.dataset.cat, v=+s.dataset.val; r[cat]=(r[cat]===v)?0:v; render(); }));
  root.querySelectorAll('[data-act="slider"]').forEach(sl=>{
    sl.addEventListener('input',()=>{ const v=+sl.value; r[sl.dataset.cat]=v;
      const rd=document.getElementById('read-'+sl.dataset.cat); if(rd){ rd.textContent=PRED_WORDS[v]; rd.classList.toggle('none',!v); }
      sl.classList.toggle('unset',!v); }); });
  const nm=document.getElementById('gname'); if(nm) nm.addEventListener('input',()=>{ name=nm.value; });
  const nt=document.getElementById('gnotes'); if(nt) nt.addEventListener('input',()=>{ r.notes=nt.value; });
  const sb=document.getElementById('submit'); if(sb) sb.addEventListener('click',submit);
}

async function submit(){
  if(submitting) return;
  if(!(name||'').trim()){ alert('Add your name first so your host knows who rated.'); return; }
  submitting=true; render();
  // pull the latest list right before writing, so we don't clobber other edits
  try{ const res=await fetch(`${API}?box=${encodeURIComponent(box)}`,{cache:'no-store'}); const j=await res.json();
    if(j&&Array.isArray(j.movies)) data=j; }catch(e){}
  const mv=data.movies.find(m=>m.id===mid);
  if(!mv){ submitting=false; stateScreen('Film not found','This film may have been removed by your host.'); return; }
  if(!Array.isArray(mv.guests)) mv.guests=[];
  let g=mv.guests.find(x=>x.id===gid);
  if(!g){ if(mv.guests.length>=3){ submitting=false; stateScreen('Guest list full','This film already has 3 guests. Ask your host to free up a spot.'); return; }
    g={id:gid||('g'+Date.now().toString(36)),ratings:blank()}; mv.guests.push(g); }
  g.name=(name||'').trim()||'Guest';
  g.ratings=r;
  g.updated=Date.now();
  try{
    const pr=await fetch(`${API}?box=${encodeURIComponent(box)}`,{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify(data)});
    if(pr.ok){ document.getElementById('root').innerHTML=
      `<div class="state"><div class="tick">🎬</div><div class="big">Thanks, ${esc(g.name)}!</div>
       <div class="small">Your ratings for <b>${esc(mv.title)}</b> are in.<br>You can close this page — or tweak and resubmit anytime from this link.</div>
       <a class="applink" href="#" onclick="location.reload();return false">Edit my ratings</a></div>`;
      submitting=false; return; }
  }catch(e){}
  submitting=false; render(); alert('Could not submit — check your connection and try again.');
}
boot();
</script>
</body>
</html>
