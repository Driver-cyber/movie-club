<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Casual App Starter</title>
<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  CASUAL APP STARTER — free cloud save with zero backend               ║
  ║                                                                        ║
  ║  Stack: one static HTML file + jsonblob.com (free, no signup) +        ║
  ║         localStorage mirror. Deploy by dropping it on Cloudflare       ║
  ║         Pages / GitHub Pages / Netlify — or just open the file.        ║
  ║                                                                        ║
  ║  HOW IT WORKS                                                          ║
  ║   • Your whole app state is ONE JSON document ("blob") in the cloud.   ║
  ║   • First run shows a setup card: create a new store, or join one      ║
  ║     by pasting its id (that's how a second device/person joins).       ║
  ║   • load() on boot, save() (debounced) on every change, mirrored to    ║
  ║     localStorage so it's instant + works offline.                      ║
  ║                                                                        ║
  ║  TO BUILD YOUR OWN APP, edit the 3 spots marked  👉 YOUR APP           ║
  ║   1) the initial shape of `state`                                      ║
  ║   2) render()  — draw your UI from `state`                             ║
  ║   3) wire()    — hook up buttons; call save() after changing `state`   ║
  ║                                                                        ║
  ║  GOTCHAS (it's for low-stakes fun, by design)                         ║
  ║   • No auth — anyone with the store id can read/write. Not for secrets.║
  ║   • jsonblob purges a blob untouched ~30 days. Keep it small (low MB). ║
  ║   • Last-write-wins: simultaneous writers can clobber. Merge by id if  ║
  ║     you go multi-user (see notes near save()).                         ║
  ╚══════════════════════════════════════════════════════════════════════╝
-->
<style>
  :root{ --bg:#0f1115; --card:#171a21; --line:#272c36; --ink:#e7e9ee; --dim:#9aa3b2; --accent:#5b8cff; --accent2:#1f2a44; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    min-height:100dvh;padding:24px 16px calc(env(safe-area-inset-bottom,0) + 24px);line-height:1.5}
  .wrap{max-width:560px;margin:0 auto}
  h1{font-size:22px;font-weight:700;letter-spacing:-0.01em}
  .sub{color:var(--dim);font-size:13px;margin-top:4px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:16px}
  label{display:block;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:7px}
  input[type=text]{width:100%;background:#0c0e12;color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:12px 13px;font-size:16px}
  input:focus{outline:2px solid var(--accent);outline-offset:1px}
  button{font:inherit;font-weight:600;cursor:pointer;border-radius:10px;border:1px solid var(--line);
    background:var(--accent2);color:var(--ink);padding:11px 15px;font-size:14px}
  button.primary{background:var(--accent);border-color:transparent;color:#fff}
  button:active{transform:translateY(1px)}
  .row{display:flex;gap:9px;align-items:center}
  .row > input{flex:1}
  ul{list-style:none;margin-top:14px;display:flex;flex-direction:column;gap:8px}
  li{display:flex;align-items:center;gap:10px;background:#0c0e12;border:1px solid var(--line);border-radius:10px;padding:11px 13px}
  li span{flex:1}
  li button{background:transparent;border:none;color:var(--dim);padding:4px 8px}
  .empty{color:var(--dim);font-size:14px;text-align:center;padding:22px 0}
  .status{margin-top:18px;font-size:12px;color:var(--dim);display:flex;align-items:center;gap:8px;justify-content:space-between;flex-wrap:wrap}
  .dot{width:8px;height:8px;border-radius:50%;background:#3a4150;display:inline-block;margin-right:6px;vertical-align:middle}
  .dot.on{background:#3fb37f}
  .link{color:var(--accent);cursor:pointer;text-decoration:underline;font-size:12px;background:none;border:none;padding:0}
  .muted{color:var(--dim);font-size:12px;margin-top:10px;line-height:1.6}
  code{background:#0c0e12;border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-size:12px}
</style>
</head>
<body>
<div class="wrap" id="root"></div>

<script>
/* ============================ CLOUD LAYER ============================ */
/* This whole section is reusable as-is. It gives you load()/save() against
   a free jsonblob store, mirrored to localStorage. */
const API   = 'https://jsonblob.com/api/jsonBlob';   // jsonblob endpoint
const APP    = 'casual-starter';                      // change per app (namespaces localStorage)
const IDKEY  = APP + ':blobid';
const DATAKEY= APP + ':data';

let blobId = localStorage.getItem(IDKEY) || '';
let saveTimer = null, status = 'local';   // 'local' | 'synced' | 'offline'

/* 👉 YOUR APP (1/3): the initial shape of your data. Put anything JSON here. */
let state = { items: [] };

function mirror(){ try{ localStorage.setItem(DATAKEY, JSON.stringify(state)); }catch(e){} }
function readMirror(){ try{ const s=localStorage.getItem(DATAKEY); return s?JSON.parse(s):null; }catch(e){ return null; } }

async function load(){
  const local = readMirror();
  if(blobId){
    try{
      const r = await fetch(`${API}/${blobId}`, {cache:'no-store'});
      if(r.ok){ state = await r.json(); mirror(); status='synced'; return; }
    }catch(e){}
  }
  if(local){ state = local; status = blobId ? 'offline' : 'local'; return; }
  status = blobId ? 'offline' : 'local';
}

function save(){ mirror(); scheduleCloud(); }            // call after every change to `state`
function scheduleCloud(){ clearTimeout(saveTimer); saveTimer = setTimeout(cloudSave, 500); }
async function cloudSave(){
  if(!blobId){ status='local'; render(); return; }
  /* MULTI-USER NOTE: this is last-write-wins. If two people edit at once one
     can clobber the other. To be safe, GET first and merge by id before PUT
     (give each item an id + `updated` timestamp and keep the newer one). */
  try{
    const r = await fetch(`${API}/${blobId}`, {method:'PUT',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify(state)});
    status = r.ok ? 'synced' : 'offline';
  }catch(e){ status='offline'; }
  render();
}

/* Setup actions */
async function createStore(){
  try{
    const r = await fetch(API, {method:'POST',
      headers:{'Content-Type':'application/json', 'Accept':'application/json'},
      body: JSON.stringify(state)});
    // jsonblob returns the new id in the Location header (.../api/jsonBlob/<id>)
    const loc = r.headers.get('Location') || '';
    const id = loc.split('/').filter(Boolean).pop();
    if(id){ blobId=id; localStorage.setItem(IDKEY,id); status='synced'; render(); }
    else alert('Could not create the store — try again.');
  }catch(e){ alert('Network error creating the store.'); }
}
async function joinStore(id){
  id = (id||'').trim().replace(/.*\//,'');   // accept a full URL or a bare id
  if(!id) return;
  blobId = id; localStorage.setItem(IDKEY, id);
  await load(); render();
}
function leaveStore(){ if(!confirm('Disconnect this store on this device?')) return;
  blobId=''; localStorage.removeItem(IDKEY); status='local'; render(); }
function copyId(){ const url = location.origin+location.pathname+'#'+blobId;
  navigator.clipboard?.writeText(url).then(()=>toast('Share link copied'), ()=>prompt('Copy:',url)); }

let toastT=null;
function toast(m){ const e=document.getElementById('toast'); if(!e) return; e.textContent=m; e.style.opacity=1;
  clearTimeout(toastT); toastT=setTimeout(()=>e.style.opacity=0,1500); }

/* ============================ YOUR APP ============================ */

/* 👉 YOUR APP (2/3): draw the UI from `state`. Replace the demo list. */
function appHTML(){
  const items = state.items || [];
  const list = items.length
    ? `<ul>${items.map((it,i)=>`<li><span>${esc(it)}</span><button data-del="${i}">✕</button></li>`).join('')}</ul>`
    : `<div class="empty">Nothing yet — add something below.</div>`;
  return `
    <div class="card">
      <div class="row">
        <input id="newItem" type="text" placeholder="Add an item…" />
        <button class="primary" id="addBtn">Add</button>
      </div>
      ${list}
    </div>`;
}

/* 👉 YOUR APP (3/3): hook up your buttons; call save() after changing state. */
function wireApp(){
  const add = ()=>{ const el=document.getElementById('newItem'); const v=(el.value||'').trim();
    if(!v) return; state.items.push(v); el.value=''; save(); render(); };
  document.getElementById('addBtn')?.addEventListener('click', add);
  document.getElementById('newItem')?.addEventListener('keydown', e=>{ if(e.key==='Enter') add(); });
  document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>{
    state.items.splice(+b.dataset.del,1); save(); render(); }));
}

/* ============================ SHELL ============================ */
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function setupHTML(){
  return `<div class="card">
    <label>Get started</label>
    <button class="primary" id="createBtn" style="width:100%;margin-bottom:12px">☁️ Create a cloud store</button>
    <label>…or join an existing one</label>
    <div class="row"><input id="joinId" type="text" placeholder="paste store id or link" /><button id="joinBtn">Join</button></div>
    <div class="muted">The store id is your key — anyone with it can read/write. Great for low-stakes fun, not for secrets.</div>
  </div>`;
}

function render(){
  const root = document.getElementById('root');
  const connected = !!blobId;
  const statusLine = connected
    ? `<span><span class="dot ${status==='synced'?'on':''}"></span>${status==='synced'?'Synced to the cloud':status==='offline'?'Saved on this device (offline)':'Saved on this device'}</span>
       <span><button class="link" id="copyBtn">Share / add a device</button> · <button class="link" id="leaveBtn">disconnect</button></span>`
    : `<span><span class="dot"></span>Saving locally only</span>`;
  root.innerHTML = `
    <h1>Casual App Starter</h1>
    <div class="sub">Free cloud save with no backend. Edit the spots marked <code>👉 YOUR APP</code>.</div>
    ${connected ? appHTML() : setupHTML()}
    <div class="status">${statusLine}</div>
    <div id="toast" style="position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#11151c;border:1px solid var(--line);color:var(--ink);padding:8px 14px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none"></div>`;
  if(connected) wireApp();
  document.getElementById('createBtn')?.addEventListener('click', createStore);
  document.getElementById('joinBtn')?.addEventListener('click', ()=>joinStore(document.getElementById('joinId').value));
  document.getElementById('copyBtn')?.addEventListener('click', copyId);
  document.getElementById('leaveBtn')?.addEventListener('click', leaveStore);
}

/* boot — also lets a #<storeId> in the URL auto-join (that's the share link) */
(async function(){
  const hash = location.hash.slice(1).trim();
  if(hash && hash!==blobId){ blobId=hash; localStorage.setItem(IDKEY,hash);
    history.replaceState(null,'',location.pathname); }
  await load();
  render();
  // optional: re-pull when returning to the tab so other devices' changes show
  document.addEventListener('visibilitychange', async()=>{
    if(document.visibilityState==='visible' && blobId){ await load(); render(); } });
})();
</script>
</body>
</html>
